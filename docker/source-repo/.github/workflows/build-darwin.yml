name: build-darwin

# 在 macOS runner 上原生编译 AdoreMix 二进制（x64 + arm64），打包为 tar.gz 上传到 release。
#
# 这个 workflow 部署在【私有源码仓库】（oxiaom/adoremix-source），不在公开 npm 仓库里。
# 编译产物由公开仓库的 pull-darwin-artifacts.yml 拉取并发布到 npm。
#
# 触发方式：
#   - 手动 workflow_dispatch，输入版本号
#   - push tag v* 时自动触发

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（用于 release tag，例如 1.0.19）'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-x64
            runner: macos-13          # Intel
            arch: x86_64
            bin_suffix: darwinx64
          - platform: darwin-arm64
            runner: macos-14          # Apple Silicon
            arch: arm64
            bin_suffix: darwinarm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show runner info
        run: |
          uname -a
          sw_vers
          uname -m
          echo "Target arch: ${{ matrix.arch }}"

      - name: Install Qt 5 + lame via Homebrew
        run: |
          brew update
          brew install qt@5 lame
          brew link --force qt@5
          echo "/opt/homebrew/opt/qt@5/bin" >> $GITHUB_PATH
          echo "/usr/local/opt/qt@5/bin" >> $GITHUB_PATH
          qmake --version
          which lame && file $(which lame)

      - name: Compile QtCipherSqlitePlugin
        run: |
          QT_PLUGIN_DIR=$(qmake -query QT_INSTALL_PLUGINS)
          echo "Qt plugins dir: $QT_PLUGIN_DIR"
          if [ -d "QtCipherSqlitePlugin" ]; then
            cd QtCipherSqlitePlugin
            qmake
            make -j$(sysctl -n hw.ncpu)
            mkdir -p "$QT_PLUGIN_DIR/sqldrivers"
            cp -v build/release/libsqlitecipher.* "$QT_PLUGIN_DIR/sqldrivers/" 2>/dev/null || \
              cp -v *.dylib "$QT_PLUGIN_DIR/sqldrivers/" 2>/dev/null || true
            cd ..
          else
            echo "QtCipherSqlitePlugin 目录不存在，跳过"
          fi

      - name: Patch AdoreMix.pro for macOS
        run: |
          # 1. 移除 Windows/Linux 专属模块（如有）
          # 2. 修正硬编码的 /opt/qt5.9.1-arm 等路径
          if [ -f AdoreMix.pro ]; then
            sed -i.bak 's|/opt/qt5.9.1-arm/[^ ]*||g' AdoreMix.pro || true
            sed -i.bak 's|/opt/[^ ]*||g' AdoreMix.pro || true
            # 移除 Windows 专属源文件（如果有）
            sed -i.bak 's|[^ ]*win\.cpp||g' AdoreMix.pro || true
            cat AdoreMix.pro | head -50
          else
            echo "找不到 AdoreMix.pro"
            ls
            exit 1
          fi

      - name: qmake + make
        run: |
          qmake AdoreMix.pro -spec macx-clang CONFIG+=release
          make -j$(sysctl -n hw.ncpu) 2>&1 | tail -80

      - name: Locate built binary
        id: bin
        run: |
          # 找到编译产物（可能在项目根、bin/ 或 build/）
          BIN=$(find . -maxdepth 3 -type f -name "AdoreMix*" ! -name "*.o" ! -name "*.cpp" 2>/dev/null | head -1)
          if [ -z "$BIN" ]; then
            echo "找不到编译产物"
            find . -name "AdoreMix*" 2>/dev/null
            exit 1
          fi
          echo "Binary: $BIN"
          file "$BIN"
          # 重命名为标准名
          TARGET="AdoreMixV8.0.17_console_${{ matrix.bin_suffix }}"
          mv "$BIN" "$TARGET"
          echo "binary=$TARGET" >> $GITHUB_OUTPUT

      - name: macdeployqt (bundle Qt frameworks)
        run: |
          BIN="${{ steps.bin.outputs.binary }}"
          # 用 macdeployqt 把 Qt frameworks + plugins 复制到二进制同级目录
          # 这样运行时不依赖 brew 装的系统 Qt
          DEPLOY_DIR=$(pwd)/_deploy
          mkdir -p "$DEPLOY_DIR"
          cp -v "$BIN" "$DEPLOY_DIR/"
          cp -v "$(which lame)" "$DEPLOY_DIR/" 2>/dev/null || \
            cp -v /opt/homebrew/bin/lame "$DEPLOY_DIR/" 2>/dev/null || \
            cp -v /usr/local/bin/lame "$DEPLOY_DIR/" || true

          cd "$DEPLOY_DIR"
          # macdeployqt 需要 .app 包，但 CLI 工具可以用 -executable 指定
          macdeployqt "$DEPLOY_DIR/$BIN" -executable="$DEPLOY_DIR/$BIN" -verbose=2 || true

          # 复制业务资源（etc/、conf/、html/、tts.js、find.js、findsc.js）
          cd ..
          for RESOURCE in etc conf html; do
            [ -d "$RESOURCE" ] && cp -R "$RESOURCE" "$DEPLOY_DIR/"
          done
          for SCRIPT in tts.js find.js findsc.js xiaoboshu.py; do
            [ -f "$SCRIPT" ] && cp -v "$SCRIPT" "$DEPLOY_DIR/"
          done

          # Qt 配置提示
          cat > "$DEPLOY_DIR/qt.conf" <<EOF
[Paths]
Plugins=./
Frameworks=./lib
EOF

          # 元信息
          cat > "$DEPLOY_DIR/.adoremix-native.json" <<EOF
{
  "platform": "darwin",
  "arch": "${{ matrix.arch }}",
  "binName": "${{ steps.bin.outputs.binary }}",
  "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "builtBy": "GitHub Actions macos runner (${{ matrix.runner }})",
  "qtVersion": "$(qmake -query QT_VERSION)"
}
EOF

          ls -la "$DEPLOY_DIR"
          echo "deploy_dir=$DEPLOY_DIR" >> $GITHUB_OUTPUT

      - name: Pack tar.gz
        id: pack
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          # 去掉 tag 前缀的 v
          VERSION="${VERSION#v}"
          TGZ="adoremix-${{ matrix.platform }}-${VERSION}.tar.gz"
          tar -czf "$TGZ" -C "${{ steps.bin.outputs.deploy_dir }}" .
          ls -lh "$TGG" 2>/dev/null || ls -lh "$TGZ"
          shasum -a 256 "$TGZ"
          echo "tgz=$TGZ" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify binary architecture
        run: |
          cd "${{ steps.bin.outputs.deploy_dir }}"
          file "${{ steps.bin.outputs.binary }}" | tee /dev/stderr
          otool -L "${{ steps.bin.outputs.binary }}" 2>&1 | head -20

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pack.outputs.version }}
          name: v${{ steps.pack.outputs.version }}
          files: ${{ steps.pack.outputs.tgz }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-deploy
          path: ${{ steps.bin.outputs.deploy_dir }}
          retention-days: 7
