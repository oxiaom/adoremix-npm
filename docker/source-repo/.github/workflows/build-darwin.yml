name: build-darwin

# 在 macOS runner 上原生编译 AdoreMix 二进制（x64 + arm64），打包为 tar.gz 上传到 release。
#
# 这个 workflow 部署在【私有源码仓库】（与 Gitee 主仓库做镜像的 GitHub 私有仓库），不在公开 npm 仓库里。
# 编译产物由公开仓库的 pull-darwin-artifacts.yml 拉取并发布到 npm。
#
# 触发方式：
#   - 手动 workflow_dispatch，输入版本号
#   - push tag v* 时自动触发

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（用于 release tag，例如 1.0.19）'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-x64
            runner: macos-13          # Intel
            arch: x86_64
            bin_suffix: darwinx64
          - platform: darwin-arm64
            runner: macos-14          # Apple Silicon
            arch: arm64
            bin_suffix: darwinarm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show runner info
        run: |
          uname -a
          sw_vers
          uname -m
          echo "Target arch: ${{ matrix.arch }}"

      - name: Install Qt 5 + deps via Homebrew
        run: |
          brew update
          # qt@5 包含 multimedia / network / sql / websockets 模块
          brew install qt@5 lame opus libogg opusfile hiredis mariadb-connector-c openssl@1.1
          brew link --force qt@5
          echo "/opt/homebrew/opt/qt@5/bin" >> $GITHUB_PATH
          echo "/usr/local/opt/qt@5/bin" >> $GITHUB_PATH
          qmake --version
          which lame && file $(which lame)
          brew --prefix opus
          brew --prefix hiredis

      - name: Compile QtCipherSqlitePlugin (nested directory)
        run: |
          set -e
          QT_PLUGIN_DIR=$(qmake -query QT_INSTALL_PLUGINS)
          echo "Qt plugins dir: $QT_PLUGIN_DIR"
          # 源码里是双层嵌套：QtCipherSqlitePlugin-develop/QtCipherSqlitePlugin-develop/
          QT_CIPHER_DIR=$(find . -maxdepth 3 -type d -name "QtCipherSqlitePlugin-develop" | head -1)
          if [ -z "$QT_CIPHER_DIR" ]; then
            QT_CIPHER_DIR=$(find . -maxdepth 3 -type d -name "QtCipherSqlitePlugin" | head -1)
          fi
          if [ -z "$QT_CIPHER_DIR" ]; then
            echo "❌ 找不到 QtCipherSqlitePlugin 目录"
            find . -maxdepth 3 -type d -name "*Cipher*" -o -name "*cipher*"
            exit 1
          fi
          echo "Found QtCipherSqlitePlugin at: $QT_CIPHER_DIR"
          cd "$QT_CIPHER_DIR"
          # 如果还是嵌套，再进一层
          if [ -d "QtCipherSqlitePlugin-develop" ]; then
            cd QtCipherSqlitePlugin-develop
          fi

          # 关键：清理所有跨平台残留的 build artifacts
          # 源码树里带着 Linux ARM 编译过的 .o / .so / Makefile / .qmake.stash，
          # 会让 macOS 链接器报 "unknown file type in '.obj/smain.o'"
          echo "清理跨平台残留 build artifacts..."
          find . -type f \( -name "*.o" -o -name "*.obj" -o -name "*.so" -o -name "*.dylib" -o -name "*.a" \) -delete
          find . -type f \( -name "Makefile" -o -name "Makefile.Debug" -o -name "Makefile.Release" \) -delete
          find . -type f \( -name ".qmake.stash" -o -name "*.prl" \) -delete
          rm -rf .obj build release debug 2>/dev/null || true
          # 残留的 .pri 可能含硬编码 /opt/qt5.9.1-arm 路径，删掉让 qmake 重新生成
          find sqlitecipher/mkspecs -type f -delete 2>/dev/null || true

          # 清理可能的旧安装（让 qmake 重装正确的 macOS 版本）
          rm -f "$QT_PLUGIN_DIR/sqldrivers/libsqlitecipher."* 2>/dev/null || true

          # ARM64 上 sqlite3mc_amalgamation.c 用 ARM AES 内联函数（vaeseq_u8 等），
          # clang 默认编译不带 aes feature，会报 'vaeseq_u8 requires target feature aes'。
          # SQLITE_OMIT_AES_* 不被 sqlite3mc respect，必须开启 aes target feature。
          # -mcpu=apple-m1 不自动带 crypto，必须 -march=armv8-a+aes 显式开 aes feature
          EXTRA_FLAGS=""
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            EXTRA_FLAGS='-mcpu=apple-m1'
          fi

          qmake "QMAKE_CFLAGS += $EXTRA_FLAGS" "QMAKE_CXXFLAGS += $EXTRA_FLAGS"
          make -j$(sysctl -n hw.ncpu)

          # 找到编译出的 .dylib（必须是真 macOS dylib，不能是 .so）
          DYLIB=$(find . -name "libsqlitecipher*.dylib" -type f | head -1)
          if [ -n "$DYLIB" ]; then
            file "$DYLIB"
            mkdir -p "$QT_PLUGIN_DIR/sqldrivers"
            cp -v "$DYLIB" "$QT_PLUGIN_DIR/sqldrivers/"
            echo "✓ QtCipherSqlitePlugin installed"
          else
            echo "❌ QtCipherSqlitePlugin 没编译出 dylib"
            find . -name "libsqlitecipher*" -type f 2>/dev/null
            exit 1
          fi

      - name: Patch AdoreMix.pro for macOS
        run: |
          # 1. 修正 TARGET 名（原硬编码 linuxarm0）
          sed -i.bak 's|^TARGET *=.*|TARGET = AdoreMixV8.0.17_console_${{ matrix.bin_suffix }}|' AdoreMix.pro

          # 2. 移除 Windows 专属链接（LIBS += -lDbgHelp 等）
          # win32{} 块在 macOS 上本来就跳过，不用动

          # 3. 用 brew 的 opus / hiredis / mariadb 替代 Windows 版 LIB
          # 追加 INCLUDEPATH + LIBS（macOS 专属块）
          OPUS_PREFIX=$(brew --prefix opus)
          HIREDIS_PREFIX=$(brew --prefix hiredis)
          MARIADB_PREFIX=$(brew --prefix mariadb-connector-c)
          OPENSSL_PREFIX=$(brew --prefix openssl@1.1)

          # 追加 macx {} 块到 .pro（用 printf 避免 YAML heredoc 缩进冲突）
          {
            echo ''
            echo 'macx {'
            echo "  INCLUDEPATH += \"$OPUS_PREFIX/include\" \"$HIREDIS_PREFIX/include\" \"$MARIADB_PREFIX/include\" \"$OPENSSL_PREFIX/include\""
            echo "  LIBS += -L\"$OPUS_PREFIX/lib\" -lopus -lopusfile -logg"
            echo "  LIBS += -L\"$HIREDIS_PREFIX/lib\" -lhiredis"
            echo "  LIBS += -L\"$MARIADB_PREFIX/lib\" -lmariadb"
            echo "  LIBS += -L\"$OPENSSL_PREFIX/lib\" -lssl -lcrypto"
            echo "  LIBS -= -lDbgHelp"
            echo '}'
          } >> AdoreMix.pro

          echo "===== Patched AdoreMix.pro ====="
          head -50 AdoreMix.pro
          echo "..."
          tail -20 AdoreMix.pro

      - name: qmake + make
        run: |
          set -o pipefail
          # 清理跨平台残留（Linux ARM 的 Makefile/.o/等会让 macOS 编译失败）
          find . -maxdepth 2 -type f \( -name "Makefile" -o -name "Makefile.Debug" -o -name "Makefile.Release" -o -name ".qmake.stash" \) -delete
          find . -maxdepth 2 -type f -name "*.o" -delete
          rm -rf release debug 2>/dev/null || true

          qmake AdoreMix.pro -spec macx-clang CONFIG+=release
          make -j$(sysctl -n hw.ncpu) 2>&1 | tee build.log | tail -100

      - name: Locate built binary
        id: bin
        run: |
          BIN_NAME="AdoreMixV8.0.17_console_${{ matrix.bin_suffix }}"
          BIN=$(find . -maxdepth 3 -type f -name "$BIN_NAME" ! -name "*.o" 2>/dev/null | head -1)
          if [ -z "$BIN" ]; then
            echo "❌ 找不到编译产物 $BIN_NAME"
            find . -name "AdoreMix*" -type f 2>/dev/null | head -10
            echo "===== build.log 最后 50 行 ====="
            tail -50 build.log
            exit 1
          fi
          echo "Binary: $BIN"
          file "$BIN"
          echo "binary=$BIN" >> $GITHUB_OUTPUT
          echo "bin_name=$BIN_NAME" >> $GITHUB_OUTPUT

      - name: macdeployqt (bundle Qt frameworks)
        run: |
          BIN="${{ steps.bin.outputs.binary }}"
          BIN_NAME="${{ steps.bin.outputs.bin_name }}"
          DEPLOY_DIR=$(pwd)/_deploy
          mkdir -p "$DEPLOY_DIR"

          # 主二进制
          cp -v "$BIN" "$DEPLOY_DIR/$BIN_NAME"

          # lame
          cp -v "$(which lame)" "$DEPLOY_DIR/" 2>/dev/null || \
            cp -v /opt/homebrew/bin/lame "$DEPLOY_DIR/" 2>/dev/null || \
            cp -v /usr/local/bin/lame "$DEPLOY_DIR/" || true

          # macdeployqt：把 Qt frameworks + plugins 复制到二进制同级并修正 @rpath
          cd "$DEPLOY_DIR"
          macdeployqt "$DEPLOY_DIR/$BIN_NAME" -executable="$DEPLOY_DIR/$BIN_NAME" -verbose=2 || true

          # 复制业务资源
          cd ..
          for RESOURCE in etc conf html; do
            [ -d "$RESOURCE" ] && cp -R "$RESOURCE" "$DEPLOY_DIR/" || true
          done
          for SCRIPT in tts.js find.js findsc.js xiaoboshu.py; do
            [ -f "$SCRIPT" ] && cp -v "$SCRIPT" "$DEPLOY_DIR/" || true
          done

          # Qt 配置提示（让二进制从同级找 plugins）
          printf '%s\n' '[Paths]' 'Plugins=./' 'Frameworks=./lib' > "$DEPLOY_DIR/qt.conf"

          # 元信息
          cat > "$DEPLOY_DIR/.adoremix-native.json" <<'JSON'
          {
            "platform": "darwin",
            "arch": "__ARCH__",
            "binName": "__BIN_NAME__",
            "builtAt": "__BUILT_AT__",
            "builtBy": "GitHub Actions macos runner (__RUNNER__)",
            "qtVersion": "__QT_VERSION__"
          }
          JSON
          sed -i.bak \
            -e "s|__ARCH__|${{ matrix.arch }}|g" \
            -e "s|__BIN_NAME__|$BIN_NAME|g" \
            -e "s|__BUILT_AT__|$(date -u +%Y-%m-%dT%H:%M:%SZ)|g" \
            -e "s|__RUNNER__|${{ matrix.runner }}|g" \
            -e "s|__QT_VERSION__|$(qmake -query QT_VERSION)|g" \
            "$DEPLOY_DIR/.adoremix-native.json"
          rm -f "$DEPLOY_DIR/.adoremix-native.json.bak"

          ls -la "$DEPLOY_DIR"
          echo "deploy_dir=$DEPLOY_DIR" >> $GITHUB_OUTPUT

      - name: Verify binary architecture
        run: |
          cd "${{ steps.bin.outputs.deploy_dir }}"
          file "${{ steps.bin.outputs.bin_name }}" | tee /dev/stderr
          echo "--- Linked libraries ---"
          otool -L "${{ steps.bin.outputs.bin_name }}" 2>&1 | head -30

      - name: Pack tar.gz
        id: pack
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          TGZ="adoremix-${{ matrix.platform }}-${VERSION}.tar.gz"
          tar -czf "$TGZ" -C "${{ steps.bin.outputs.deploy_dir }}" .
          ls -lh "$TGZ"
          shasum -a 256 "$TGZ"
          echo "tgz=$TGZ" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pack.outputs.version }}
          name: v${{ steps.pack.outputs.version }}
          files: ${{ steps.pack.outputs.tgz }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-deploy
          path: ${{ steps.bin.outputs.deploy_dir }}
          retention-days: 7
