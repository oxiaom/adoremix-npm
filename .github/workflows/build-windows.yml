name: build-windows

# 构建 Windows x64 原生二进制。
# 在 windows-latest runner 上用 aqtinstall 拉 Qt 5.15.2 mingw81_64 + mingw-w64 编译。

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Adore_mix2 源码 tar.gz 下载 URL'
        required: true
      version:
        description: '版本号'
        required: false
        default: '1.0.0'
  workflow_call:
    inputs:
      source_url:
        type: string
        required: true
      version:
        type: string
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt 5.15.2 mingw81_64
        run: |
          aqt install-qt windows desktop 5.15.2 win64_mingw81 -m qtwebsockets qttools
          # 装配套的 mingw 8.1（Qt 5.15.2 mingw81 是用 mingw 8.1 编译的，必须配对）
          aqt install-tool windows desktop tools_mingw qt.tools.win64_mingw810

      - name: Download source
        shell: bash
        run: |
          mkdir -p _src/Adore_mix2
          curl -L -o _src/adoremix.tar.gz "${{ inputs.source_url }}"
          tar -xzf _src/adoremix.tar.gz -C _src/Adore_mix2 --strip-components=0
          test -f _src/Adore_mix2/AdoreMix.pro

      - name: Build AdoreMix
        shell: bash
        env:
          QT_ROOT: ${{ github.workspace }}/Qt/5.15.2/mingw81_64
          MINGW_BIN: ${{ github.workspace }}/Tools/mingw810_64/bin
        run: |
          # 复用本地脚本（已包含所有源码 sed 修复 + sqlitecipher 编译 + windeployqt）
          ./docker/build-win32-x64.sh --src _src/Adore_mix2

      - name: Commit artifacts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workspaces/win32-x64/native
          if git diff --cached --quiet; then
            echo "无变化，跳过 commit"
          else
            git commit -m "ci(win32-x64): rebuild native from ${{ inputs.version }}"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win32-x64-native
          path: workspaces/win32-x64/native
          retention-days: 7
