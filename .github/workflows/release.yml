name: release

# push tag v* 时触发：5 包按子→主顺序发到 npm。
# 仓库 Secrets 需要配置 NPM_TOKEN（automation 类型，避免 2FA 阻塞）。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的版本号（必须已 bump 到所有 package.json）'
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure npm token
        run: npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Verify version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG=${GITHUB_REF#refs/tags/v}
          fi
          PKG_VER=$(node -p "require('./workspaces/adoremix/package.json').version")
          if [ "$TAG" != "$PKG_VER" ]; then
            echo "❌ tag ($TAG) ≠ package.json ($PKG_VER)"
            exit 1
          fi
          echo "✓ Releasing v$PKG_VER"

      - name: Add os/cpu fields to sub-packages
        run: node scripts/publish-prepare.js add

      - name: Publish 4 platform sub-packages
        run: |
          for sub in win32-x64 linux-x64 linux-arm64 linux-arm; do
            native_dir="workspaces/$sub/native"
            if [ ! -d "$native_dir" ] || [ "$(find "$native_dir" -type f | wc -l)" -le 1 ]; then
              echo "⚠️  $sub native/ 为空，跳过（可能未构建）"
              continue
            fi
            echo ""
            echo ">>> 发布 @oxiaom/adoremix-$sub"
            (cd "$native_dir/.." && npm publish --access public)
          done

      - name: Publish main @oxiaom/adoremix package
        run: |
          echo ""
          echo ">>> 发布 @oxiaom/adoremix (主包)"
          cd workspaces/adoremix
          npm publish --access public

      - name: Remove os/cpu fields（清理，让本地开发 install 不报错）
        if: always()
        run: node scripts/publish-prepare.js remove

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## npm packages

            - `@oxiaom/adoremix@${{ github.ref_name }}` (CLI 主包)
            - `@oxiaom/adoremix-win32-x64`
            - `@oxiaom/adoremix-linux-x64`
            - `@oxiaom/adoremix-linux-arm64`
            - `@oxiaom/adoremix-linux-arm`

            ## 安装

            ```bash
            npm install -g @oxiaom/adoremix
            adoremix install
            adoremix start
            ```
