<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
	<meta http-equiv="Access-Control-Allow-Origin" content="*" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title></title>
    <script src="/yunwei/js/js.cookie.js"></script>
    <script src="/yunwei/js/mui.min.js"></script>
	<script src="/yunwei/js/axios.min.js"></script> 
    <link href="/yunwei/css/mui.min.css" rel="stylesheet"/>

</head>
<body>
	<header class="mui-bar mui-bar-nav">
	    <a class="mui-action-back mui-icon   mui-pull-left"></a>
	    <h1 class="mui-title">ID：<span class="mui-badge" id="lusername">1 </span> </h1>
	</header>
	<div class="mui-content">
	        <ul class="mui-table-view mui-grid-view mui-grid-9">
	            <li class="mui-table-view-cell mui-media mui-col-xs-4 mui-col-sm-3"><a href="devicelist.html">
	                    <span class="mui-icon mui-icon mui-icon-list"><span class="mui-badge" id="devicescount">0</span></span>
	                    <div class="mui-media-body">设备列表</div></a></li>
	            <li class="mui-table-view-cell mui-media mui-col-xs-4 mui-col-sm-3"><a href="#">
	                    <span class="mui-icon mui-icon mui-icon-map"></span>
	                    <div class="mui-media-body">位置标注</div></a></li>	  
				<li class="mui-table-view-cell mui-media mui-col-xs-4 mui-col-sm-3" id="fuckflash"><a href="#">
				        <span class="mui-icon mui-icon-refresh"></span>
				        <div class="mui-media-body">刷新</div></a></li>		
	       
	        </ul> 
	</div>
	 
	<script type="text/javascript" charset="utf-8">
		console.log("tap event trigger=======================");
	  	 mui.init();   
		 var o =  mui('#lusername'); 
		 o[0].innerHTML = Cookies.get("username");
		 
		 var btn = document.getElementById("fuckflash");
		 btn.addEventListener("tap",function () {
		   flashdata();
		 });
		 
		 var  demores; 
		 //axios.defaults.baseURL = "http://193.112.4.188:10080/";
		 flashdata();
		 function flashdata(){ 
			 var username =Cookies.get("username");
			 var passwd =Cookies.get("passwd");
			 axios
			   .get("/devicecount.php", {
			     params: {
			       passwd:passwd,
			       username: username
			     }
			   })
			   .then(
			     function(res) {
			       if (res.data.res) {	
			 				   demores = res;  
			 				 
			 				   var allcount=0;
			 				   var offlinecount=0;
			 				   for(var objs in  demores.data.dataJson){
			 					   if(demores.data.dataJson[objs].status == "0"){
			 						  offlinecount++; 
			 					   }  
			 					   allcount++;	   
			 				   }
			 				   mui("#devicescount")[0].innerHTML=allcount;
			 				   mui("#devicesofflinecount")[0].innerHTML=offlinecount;
			       }else {
			         mui.toast("loginerror"); 
			       }
			     }.bind(this)
			   )
			   .catch(function(res) {
			     console.log(res);
			   });			 
		 }	
		   
	</script>
</body>
</html>
