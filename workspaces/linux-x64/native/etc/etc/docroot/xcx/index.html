<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
	<meta http-equiv="Access-Control-Allow-Origin" content="*" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title></title>
	<script src="/yunwei/js/js.cookie.js"></script>
    <script src="/yunwei/js/mui.min.js"></script>
	<script src="/yunwei/js/axios.min.js"></script> 
    <link href="/yunwei/css/mui.min.css" rel="stylesheet"/>

</head>
<body>
	<div  style="padding-top: 200px;padding-bottom: 20px;text-align: center;">
		<span style="text-align: center;"> <h3>运维专版</h3></span>
    </div>
	<form class="mui-input-group">
	    <div class="mui-input-row">
	        <label>用户名</label>
	    <input type="text" id="usernamelogin" class="mui-input-clear" placeholder="请输入用户名">
	    </div>
	    <div class="mui-input-row">
	        <label>密码</label>
	        <input type="password" id="passwdlogin"  class="mui-input-password" placeholder="请输入密码">
	    </div>
	    <div class="mui-button-row">
	        <button id="loginbut" type="button" onclick="loginclick();" class="mui-btn mui-btn-primary" >登录</button> 
	    </div>
	</form>
	<script type="text/javascript" charset="utf-8">
		console.log("tap event trigger=======================");
		 
	  	mui.init(  ); 
		//axios.defaults.baseURL = "http://193.112.4.188:10080/";
		 
		console.log("tap event trigger5");
		function loginclick(){		
			var username = document.getElementById("usernamelogin").value;
			var passwd = document.getElementById("passwdlogin").value;
			axios
			  .get("/checkuser.php", {
			    params: {
			      passwd:passwd,
			      username: username
			    }
			  })
			  .then(
			    function(res) {
			      if (res.data.res) {			        
					mui.toast("Loginin"); 
					Cookies.set("username", res.data.user_name);
					Cookies.set("id", res.data.id);
					Cookies.set("passwd", res.data.user_pass);
					Cookies.set("user_type", res.data.user_type);
					Cookies.set("master_id", res.data.master_id);
					Cookies.set("mask", res.data.mask);
					Cookies.set("play_level", res.data.play_level);
					Cookies.set("user_level", res.data.user_level); 
					mui.toast(Cookies.get("username"));
					mui.openWindow({url:'main.html',extras:{username:res.data.user_name,user_pass:res.data.user_pass,id:res.data.id}});
			      }else {
			        mui.toast("loginerror"); 
			      }
			    }.bind(this)
			  )
			  .catch(function(res) {
			    console.log(res);
			  });
			
		}
		 
	</script>
</body>
</html>
